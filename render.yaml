# Render Blueprint — deploys the POS web dashboard + a free PostgreSQL database.
# Push this repo to GitHub, then in Render: New ▸ Blueprint ▸ pick this repo.
databases:
  - name: pos-db
    plan: free

services:
  - type: web
    name: pos-system
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/summary
    autoDeploy: true
    envVars:
      # Render injects the database connection string here; the app detects it
      # and switches from CSV files to PostgreSQL automatically.
      - key: DATABASE_URL
        fromDatabase:
          name: pos-db
          property: connectionString
